<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Reading WPM Counter</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --bg: #0b0f14;
      --card: #121821;
      --card-2: #18202b;
      --text: #e5edf6;
      --muted: #9aa7b5;
      --line: #2b3644;
      --accent: #7cc4ff;
      --accent-2: #1d2a36;
      --ok: #6ee7b7;
      --warn: #fbbf24;
      --danger: #fca5a5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(124,196,255,.08), transparent 30%),
        linear-gradient(180deg, #0a0e13 0%, #0b0f14 100%);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.28);
      backdrop-filter: blur(8px);
    }
    .app-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .app-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(180deg, #223447, #15202c);
      display: grid;
      place-items: center;
      font-size: 24px;
      border: 1px solid #314255;
      color: #fff;
      flex: 0 0 auto;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      letter-spacing: .01em;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.02);
      color: var(--muted);
      font-size: 12px;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: .01em;
    }
    textarea {
      width: 100%;
      min-height: 450px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      font-size: 18px;
      line-height: 1.6;
      resize: vertical;
      background: #0f141b;
      color: var(--text);
      outline: none;
    }
    textarea:focus {
      border-color: #4b6a87;
      box-shadow: 0 0 0 3px rgba(124,196,255,.12);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.02);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 0 0 rgba(251,191,36,.35);
    }
    .dot.running {
      background: var(--ok);
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(110,231,183,.35); }
      70% { box-shadow: 0 0 0 10px rgba(110,231,183,0); }
      100% { box-shadow: 0 0 0 0 rgba(110,231,183,0); }
    }
    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #131b24, #10161e);
    }
    .stat .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat .v {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: .01em;
    }
    .stat .sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    button {
      appearance: none;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #17202a, #121922);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    button.primary {
      background: linear-gradient(180deg, #89d0ff, #61b8ff);
      color: #05111d;
      border-color: #8fd2ff;
    }
    button.stop {
      background: linear-gradient(180deg, #23303c, #17212b);
    }
    button:disabled {
      opacity: .45;
      cursor: default;
    }
    .small {
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }
    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .buttons { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="app-header">
        <div class="app-icon">📘</div>
        <div>
          <h1>Reading WPM Counter</h1>
        </div>
      </div>
    </div>

    <div class="card">
      <label for="text">英文</label>
      <textarea id="text" placeholder="ここに英文を貼り付けてください"></textarea>
      <div class="small">単語数は空白区切りで自動カウントします。テキストは自動保存されます。</div>
      <div id="status" class="status"><span id="statusDot" class="dot"></span><span id="statusText">待機中</span></div>
      <div class="buttons">
        <button id="startBtn" class="primary">開始</button>
        <button id="stopBtn" class="stop" disabled>終了</button>
        <button id="resetBtn">リセット</button>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div class="stat">
          <div class="k">単語数</div>
          <div class="v" id="words">0</div>
          <div class="sub">貼り付けた英文から自動計測</div>
        </div>
        <div class="stat">
          <div class="k">経過時間</div>
          <div class="v" id="time">00:00</div>
          <div class="sub">開始から終了までをリアルタイム表示</div>
        </div>
        <div class="stat">
          <div class="k">WPM</div>
          <div class="v" id="wpm">0.0</div>
          <div class="sub">words per minute</div>
        </div>
        <div class="stat">
          <div class="k">前回の結果</div>
          <div class="v" id="last">-</div>
          <div class="sub">最新の計測結果</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_TEXT_KEY = 'wpm_pwa_text';
    const STORAGE_LAST_KEY = 'wpm_pwa_last';

    const textEl = document.getElementById('text');
    const wordsEl = document.getElementById('words');
    const timeEl = document.getElementById('time');
    const wpmEl = document.getElementById('wpm');
    const lastEl = document.getElementById('last');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');

    let startTime = null;
    let timerId = null;
    let running = false;
    let elapsedMs = 0;

    function countWords(text) {
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    function formatElapsed(ms) {
      const totalSec = Math.floor(ms / 1000);
      const min = String(Math.floor(totalSec / 60)).padStart(2, '0');
      const sec = String(totalSec % 60).padStart(2, '0');
      return `${min}:${sec}`;
    }

    function updateWordCount() {
      const count = countWords(textEl.value);
      wordsEl.textContent = count;
      localStorage.setItem(STORAGE_TEXT_KEY, textEl.value);
      return count;
    }

    function setStatus(mode) {
      if (mode === 'running') {
        statusText.textContent = '計測中';
        statusDot.classList.add('running');
      } else if (mode === 'done') {
        statusText.textContent = '計測完了';
        statusDot.classList.remove('running');
      } else {
        statusText.textContent = '待機中';
        statusDot.classList.remove('running');
      }
    }

    function updateDisplayFromElapsed(ms) {
      elapsedMs = ms;
      timeEl.textContent = formatElapsed(ms);
      const words = countWords(textEl.value);
      const minutes = ms / 60000;
      const wpm = minutes > 0 ? words / minutes : 0;
      wpmEl.textContent = wpm.toFixed(1);
    }

    function startTimer() {
      timerId = setInterval(() => {
        if (!running || startTime === null) return;
        updateDisplayFromElapsed(Date.now() - startTime);
      }, 200);
    }

    function stopTimer() {
      clearInterval(timerId);
      timerId = null;
    }

    textEl.addEventListener('input', updateWordCount);

    startBtn.addEventListener('click', () => {
      const words = updateWordCount();
      if (words === 0) {
        alert('先に英文を貼り付けてください。');
        return;
      }
      if (running) return;

      startTime = Date.now();
      running = true;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      setStatus('running');
      updateDisplayFromElapsed(0);
      startTimer();
    });

    stopBtn.addEventListener('click', () => {
      if (!running || startTime === null) {
        alert('先に開始ボタンを押してください。');
        return;
      }

      running = false;
      stopTimer();
      updateDisplayFromElapsed(Date.now() - startTime);

      const lastValue = `${wpmEl.textContent} WPM`;
      lastEl.textContent = lastValue;
      localStorage.setItem(STORAGE_LAST_KEY, lastValue);

      startBtn.disabled = false;
      stopBtn.disabled = true;
      setStatus('done');
    });

    resetBtn.addEventListener('click', () => {
      running = false;
      startTime = null;
      stopTimer();
      updateDisplayFromElapsed(0);
      startBtn.disabled = false;
      stopBtn.disabled = true;
      setStatus('idle');
    });

    function loadSaved() {
      const savedText = localStorage.getItem(STORAGE_TEXT_KEY) || '';
      const savedLast = localStorage.getItem(STORAGE_LAST_KEY) || '-';
      textEl.value = savedText;
      lastEl.textContent = savedLast;
      updateWordCount();
      updateDisplayFromElapsed(0);
      setStatus('idle');
    }

    loadSaved();

    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
