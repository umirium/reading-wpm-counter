<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Reading WPM Counter</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --bg: #0b0f14;
      --card: #121821;
      --text: #e5edf6;
      --muted: #9aa7b5;
      --line: #2b3644;
      --accent: #7cc4ff;
      --ok: #6ee7b7;
      --warn: #fbbf24;
      --danger: #fca5a5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(124,196,255,.08), transparent 30%),
        linear-gradient(180deg, #0a0e13 0%, #0b0f14 100%);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.28);
      backdrop-filter: blur(8px);
    }
    .app-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .app-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(180deg, #223447, #15202c);
      display: grid;
      place-items: center;
      font-size: 24px;
      border: 1px solid #314255;
      color: #fff;
      flex: 0 0 auto;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      letter-spacing: .01em;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: .01em;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    button {
      appearance: none;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #17202a, #121922);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      min-height: 52px;
    }
    button.primary {
      background: linear-gradient(180deg, #89d0ff, #61b8ff);
      color: #05111d;
      border-color: #8fd2ff;
    }
    button.stop {
      background: linear-gradient(180deg, #23303c, #17212b);
    }
    button.save {
      background: linear-gradient(180deg, #203344, #182734);
    }
    button:disabled {
      opacity: .45;
      cursor: default;
    }
    textarea {
      width: 100%;
      min-height: 60vh;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      font-size: 20px;
      line-height: 1.7;
      resize: vertical;
      background: #0f141b;
      color: var(--text);
      outline: none;
      -webkit-text-size-adjust: 100%;
    }
    textarea:focus {
      border-color: #4b6a87;
      box-shadow: 0 0 0 3px rgba(124,196,255,.12);
    }
    .small {
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.02);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 0 0 rgba(251,191,36,.35);
    }
    .dot.running {
      background: var(--ok);
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(110,231,183,.35); }
      70% { box-shadow: 0 0 0 10px rgba(110,231,183,0); }
      100% { box-shadow: 0 0 0 0 rgba(110,231,183,0); }
    }
    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #131b24, #10161e);
    }
    .stat .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat .v {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: .01em;
    }
    .stat .sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }
    .saved-list {
      display: grid;
      gap: 12px;
    }
    .saved-item {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, #131b24, #10161e);
    }
    .saved-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .saved-preview {
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      word-break: break-word;
      flex: 1;
    }
    .saved-date {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .saved-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .meta-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: rgba(255,255,255,.02);
    }
    .meta-box .mk {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .meta-box .mv {
      font-size: 18px;
      font-weight: 800;
    }
    .saved-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .saved-actions button {
      padding: 10px 14px;
      font-size: 14px;
      border-radius: 12px;
      min-height: 44px;
    }
    .danger {
      color: var(--danger);
      border-color: rgba(252,165,165,.4);
    }
    .empty {
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 640px) {
      .wrap {
        padding: 12px;
        padding-bottom: calc(20px + env(safe-area-inset-bottom));
      }
      .row { grid-template-columns: 1fr; }
      .buttons { grid-template-columns: 1fr 1fr; }
      .saved-meta { grid-template-columns: 1fr 1fr; }
      h1 { font-size: 24px; }
      textarea {
        min-height: 70vh;
        font-size: 21px;
        line-height: 1.75;
        padding: 18px 16px;
      }
      button {
        font-size: 17px;
        min-height: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="app-header">
        <div class="app-icon">📘</div>
        <div>
          <h1>Reading WPM Counter</h1>
        </div>
      </div>
    </div>

    <div class="card">
      <label for="text">英文</label>
      <div class="buttons">
        <button id="startBtn" class="primary">開始</button>
        <button id="stopBtn" class="stop" disabled>終了</button>
        <button id="resetBtn">リセット</button>
        <button id="saveBtn" class="save">保存</button>
      </div>
      <textarea id="text" placeholder="ここに英文を貼り付けてください"></textarea>
      <div class="small">単語数は空白区切りで自動カウントします。開始時に未保存の英文は自動保存されます。</div>
      <div id="status" class="status"><span id="statusDot" class="dot"></span><span id="statusText">待機中</span></div>
    </div>

    <div class="card">
      <div class="row">
        <div class="stat">
          <div class="k">単語数</div>
          <div class="v" id="words">0</div>
          <div class="sub">貼り付けた英文から自動計測</div>
        </div>
        <div class="stat">
          <div class="k">経過時間</div>
          <div class="v" id="time">00:00</div>
          <div class="sub">開始から終了までをリアルタイム表示</div>
        </div>
        <div class="stat">
          <div class="k">WPM</div>
          <div class="v" id="wpm">0.0</div>
          <div class="sub">words per minute</div>
        </div>
        <div class="stat">
          <div class="k">前回の結果</div>
          <div class="v" id="last">-</div>
          <div class="sub">最新の計測結果</div>
        </div>
      </div>
    </div>

    <div class="card">
      <label>保存済み英文</label>
      <div id="savedList" class="saved-list"></div>
      <div id="emptyState" class="empty">まだ保存された英文はありません。</div>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
